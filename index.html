<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Converter Tool</title>
    <style>
        body { background-color: #eef2f5; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; }
        .box-container { width: 500px; margin: 50px auto; background: #ffffff; border: 2px solid #333; padding: 15px; }
        h1 { text-align: center; font-size: 20px; color: #222; }
        .tab-buttons { width: 100%; margin-bottom: 15px; }
        .tab-buttons button { width: 48%; padding: 8px; font-size: 14px; cursor: pointer; }
        .active-btn { background-color: #333; color: white; font-weight: bold; }
        .upload-zone { border: 2px dashed #777; background: #fafafa; padding: 35px 10px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        .action-button { background: #007bff; color: white; width: 100%; padding: 10px; font-size: 15px; border: 1px solid #0069d9; cursor: pointer; }
        .action-button:hover { background: #0069d9; }
        .status { margin: 10px 0; font-size: 13px; color: red; text-align: center; }
        .grid-preview { margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; }
        .thumb { display: inline-block; border: 1px solid #000; padding: 4px; margin: 5px; width: 80px; text-align: center; background: #fff; }
        .thumb img { width: 100%; }
        .my-footer { margin-top: 25px; padding-top: 10px; border-top: 1px solid #ccc; font-size: 12px; color: #444; line-height: 1.6; }
    </style>
</head>
<body>

<div class="box-container">
    <h1>My Converter (PDF & Images)</h1>
    <hr>
    <div class="tab-buttons">
        <button id="tab1" class="active-btn" onclick="goTab('pdf')">PDF to Image</button>
        <button id="tab2" onclick="goTab('img')">Image to PDF</button>
    </div>

    <div id="pdfView">
        <div class="upload-zone" onclick="document.getElementById('input_pdf').click()">
            <span id="txt_pdf">Click to upload PDF File</span>
            <input type="file" id="input_pdf" accept="application/pdf" style="display: none;">
        </div>
        <button class="action-button" id="start_pdf_btn">Convert Now</button>
    </div>

    <div id="imgView" style="display: none;">
        <div class="upload-zone" onclick="document.getElementById('input_img').click()">
            <span id="txt_img">Click to upload Images</span>
            <input type="file" id="input_img" accept="image/*" multiple style="display: none;">
        </div>
        <button class="action-button" id="start_img_btn" style="background: #28a745; border-color: #28a745;">Merge to PDF</button>
    </div>

    <div id="msgBox" class="status">System Status: Waiting...</div>
    <div id="outGrid" class="grid-preview"></div>

    <div class="my-footer">
        <strong>Author:</strong> Ahmad Sazid <br>
        <strong>Email:</strong> <a href="mailto:sazidahmad2nd@gmail.com">sazidahmad2nd@gmail.com</a>
        
        <!-- Visitor Counter -->
        <div style="margin-top:10px;">
            <strong>Total Visitors:</strong><br>
            <a href="https://www.hitwebcounter.com" target="_blank">
            <img src="https://hitwebcounter.com/counter/counter.php?page=8050965&style=0006&nbdigits=5&type=page&initCount=0" title="Free Counter" Alt="web counter" border="0"/></a>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    var globalPdf = null;
    var globalImages = [];

    function goTab(tabName) {
        document.getElementById('outGrid').innerHTML = '';
        document.getElementById('msgBox').innerText = 'System Status: Waiting...';
        document.getElementById('msgBox').style.color = 'red';
        if (tabName == 'pdf') {
            document.getElementById('pdfView').style.display = 'block';
            document.getElementById('imgView').style.display = 'none';
            document.getElementById('tab1').className = 'active-btn';
            document.getElementById('tab2').className = '';
        } else {
            document.getElementById('pdfView').style.display = 'none';
            document.getElementById('imgView').style.display = 'block';
            document.getElementById('tab1').className = '';
            document.getElementById('tab2').className = 'active-btn';
        }
    }

    document.getElementById('input_pdf').onchange = (e) => {
        globalPdf = e.target.files[0];
        document.getElementById('txt_pdf').innerText = "Selected: " + globalPdf.name;
        document.getElementById('msgBox').innerText = "PDF ready.";
        document.getElementById('msgBox').style.color = 'green';
    };

    document.getElementById('input_img').onchange = (e) => {
        globalImages = Array.from(e.target.files);
        document.getElementById('txt_img').innerText = globalImages.length + " images selected.";
        document.getElementById('msgBox').innerText = "Images ready to merge.";
        document.getElementById('msgBox').style.color = 'green';
    };

    document.getElementById('start_pdf_btn').onclick = function() {
        if (!globalPdf) return alert('Select a PDF first!');
        var mBox = document.getElementById('msgBox');
        var grid = document.getElementById('outGrid');
        grid.innerHTML = '';
        
        var reader = new FileReader();
        reader.onload = function() {
            pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise.then(async (pdf) => {
                for (let p = 1; p <= pdf.numPages; p++) {
                    mBox.innerText = 'Processing page ' + p;
                    const page = await pdf.getPage(p);
                    const viewport = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width; canvas.height = viewport.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                    const url = canvas.toDataURL('image/jpeg');
                    grid.innerHTML += `<div class="thumb"><img src="${url}"><br><a href="${url}" download="page_${p}.jpg">Save</a></div>`;
                }
                mBox.innerText = 'Finished!';
            });
        };
        reader.readAsArrayBuffer(globalPdf);
    };

    document.getElementById('start_img_btn').onclick = async function() {
        if (globalImages.length == 0) return alert('Select images first!');
        var mBox = document.getElementById('msgBox');
        var grid = document.getElementById('outGrid');
        grid.innerHTML = '';
        const { jsPDF } = window.jspdf;
        let pdf = null;

        const fileToData = (file) => new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });

        for (let i = 0; i < globalImages.length; i++) {
            mBox.innerText = 'Processing image ' + (i + 1);
            const data = await fileToData(globalImages[i]);
            const img = await new Promise(res => {
                const iObj = new Image();
                iObj.onload = () => res(iObj);
                iObj.src = data;
            });
            
            if (i === 0) {
                pdf = new jsPDF({ unit: 'px', format: [img.width, img.height] });
                pdf.addImage(data, 'JPEG', 0, 0, img.width, img.height);
            } else {
                pdf.addPage([img.width, img.height]);
                pdf.addImage(data, 'JPEG', 0, 0, img.width, img.height);
            }
        }
        const url = URL.createObjectURL(pdf.output('blob'));
        grid.innerHTML = `<a href="${url}" download="merged.pdf" style="font-weight:bold; color:green;">Download Merged PDF</a>`;
        mBox.innerText = 'PDF creation successful!';
    };
</script>
</body>
</html>
